# API Configuration
apis:
  polymarket:
    base_url: "https://clob.polymarket.com"
    enabled: true
    
  kalshi:
    base_url: "https://trading-api.kalshi.com/trade-api/v2"
    enabled: true
    # Add your credentials in environment variables:
    # KALSHI_EMAIL and KALSHI_PASSWORD
    
  opinion:
    base_url: "https://api.opinion.trade"
    enabled: true
    # Add your credentials in environment variables:
    # OPINION_API_KEY
    
  fear_greed:
    base_url: "https://api.alternative.me/fng/"
    enabled: true
    
  coingecko:
    base_url: "https://api.coingecko.com/api/v3"
    enabled: true

# Database Configuration
database:
  # Set SUPABASE_URL and SUPABASE_KEY in environment variables
  batch_size: 100
  
# Monitoring Configuration
monitoring:
  email_alerts: true
  # Set these in environment variables:
  # ALERT_EMAIL_FROM
  # ALERT_EMAIL_TO
  # SMTP_HOST
  # SMTP_PORT
  # SMTP_USER
  # SMTP_PASSWORD
  
# Scheduling
schedule:
  interval_minutes: 15
